<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire Editor | Agamemons</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="notranslate">
<div class="admin-container">
    <div class="editor-card">
        <header class="editor-header">
            <h2 id="editor-title"><i class="fas fa-scroll"></i> Grimoire Editor</h2>
            <p style="font-size: 12px; color: #8b949e; margin-top: 10px;">Forge your lore into the digital void.</p>
        </header>

        <form id="adminStoryForm">
            <div class="form-group">
                <label><i class="fas fa-signature"></i> Title of Fragment</label>
                <input type="text" id="title" placeholder="e.g., The Ancient Docker Script" required>
            </div>

            <div class="form-group" style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px;">
                <div>
                    <label><i class="fas fa-eye"></i> Excerpt (Teaser)</label>
                    <input type="text" id="excerpt" placeholder="Brief summary..." required>
                </div>
                <div>
                    <label><i class="fas fa-tags"></i> Category</label>
                    <select id="category">
                        <option value="LORE">LORE</option>
                        <option value="TECH">TECH</option>
                        <option value="DEVOPS">DEVOPS</option>
                        <option value="QUEST">QUEST</option>
                    </select>
                </div>
                <div>
                    <label><i class="fas fa-gem"></i> Rarity</label>
                    <select id="rarity">
                        <option value="Common" style="color: #58a6ff;">Common</option>
                        <option value="Mythic" style="color: #e3b341;">Mythic</option>
                        <option value="Artifact" style="color: #a371f7;">Artifact</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-feather-alt"></i> Fragment Content</label>
                <textarea id="content" rows="12" placeholder="Write the dark fantasy lore here..." required></textarea>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="cast-btn" id="submitBtn" style="flex: 2;">
                    <i class="fas fa-wand-sparkles"></i> Cast Fragment
                </button>
                <button type="button" id="cancelBtn" class="cancel-btn" style="display: none; flex: 1;" onclick="resetForm()">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>
        </form>

        <div id="msg-status"></div>

        <div class="edit-list">
            <label><i class="fas fa-book-dead"></i> Existing Fragments</label>
            <div id="admin-story-list">
                <p style="color: #8b949e; font-size: 13px; text-align: center;">Reading the ancient scrolls...</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" class="return-link">
                <i class="fas fa-arrow-left"></i> Return to Sanctuary
            </a>
        </div>
    </div>
</div>
<script src="js/admin.js"></script>
</body>
</html>
